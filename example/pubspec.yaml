name: bootpay_flutter_example
description: Demonstrates how to use the bootpay_flutter plugin.

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=2.18.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter

  bootpay:
    # When depending on this package from a real application you should use:
    #   bootpay_flutter: ^x.y.z
    # See https://dart.dev/tools/pub/dependencies#version-constraints
    # The example app is bundled with the plugin so we use a path dependency on
    # the parent directory to use the current plugin's version.
    path: ../

#  bootpay_webview_flutter_android: 3.2.13
#  bootpay_webview_flutter_wkwebview: 3.0.25

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.2

  flutter_dotenv: ^5.1.0


dev_dependencies:
  build_runner: ^2.1.5
  espresso: ^0.4.0
  flutter_driver:
    sdk: flutter
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
#  bootpay_webview_flutter_platform_interface: 2.0.16

# 로컬 webview 서브모듈 (multi-sdk/client/flutter/bootpay-flutter-webview/*) 을
# example 빌드에서 바로 쓰고 싶을 때 아래 블록을 해제. 배포 커밋에는 포함 금지.
# dependency_overrides:
#   bootpay_webview_flutter:
#     path: ../../bootpay-flutter-webview/bootpay_webview_flutter
#   bootpay_webview_flutter_android:
#     path: ../../bootpay-flutter-webview/bootpay_webview_flutter_android
#   bootpay_webview_flutter_wkwebview:
#     path: ../../bootpay-flutter-webview/bootpay_webview_flutter_wkwebview
#   bootpay_webview_flutter_platform_interface:
#     path: ../../bootpay-flutter-webview/bootpay_webview_flutter_platform_interface

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - .env

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
